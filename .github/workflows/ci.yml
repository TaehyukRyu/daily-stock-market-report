name: Daily Report

# ──────────────────────────────────────────────────────────────
# 스케줄: 매일 06:10 KST (= 전날 21:10 UTC), 평일(월~금)만
#
# KST(UTC+9) 변환:
#   월요일 06:10 KST = 일요일 21:10 UTC  → cron day 0
#   화요일 06:10 KST = 월요일 21:10 UTC  → cron day 1
#   수요일 06:10 KST = 화요일 21:10 UTC  → cron day 2
#   목요일 06:10 KST = 수요일 21:10 UTC  → cron day 3
#   금요일 06:10 KST = 목요일 21:10 UTC  → cron day 4
# ──────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '10 21 * * 0-4'
  workflow_dispatch:            # 수동 실행 (테스트용)

# 동시 실행 방지 (이전 실행이 완료될 때까지 대기)
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run Investment Report Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 40         # pipeline 총 제한: 30분 + 여유 10분

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.11 환경 설정 ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      # ── 3. TA-Lib C 라이브러리 설치 (Ubuntu 22.04 apt) ───────────
      # Ubuntu 패키지: libta-lib-dev (TA-Lib 0.4.0)
      # Python 래퍼 TA-Lib==0.4.32 컴파일을 위해 선행 설치 필요
      - name: Install TA-Lib C library
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libta-lib-dev

      # ── 4. Python 의존성 설치 ─────────────────────────────────────
      # [DEP-02] langchain-core 먼저 고정 → langchain-anthropic에 의한
      #          0.3.86 다운그레이드 방지
      # requirements-ci.txt: 파이프라인 실행 전용, UTF-8, Windows 패키지 미포함
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install langchain-core==1.3.3
          pip install -r requirements-ci.txt

      # ── 5. 런타임 디렉토리 생성 ───────────────────────────────────
      # SQLite DB, 리포트 백업, 신호 파일 저장 경로
      - name: Create runtime directories
        run: mkdir -p data/reports data/signals logs

      # ── 6. 파이프라인 실행 ────────────────────────────────────────
      - name: Run pipeline
        env:
          # ── OpenAI ─────────────────────────────────────────────
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}

          # ── Anthropic ──────────────────────────────────────────
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}

          # ── 거시경제 데이터 ────────────────────────────────────
          FRED_API_KEY:           ${{ secrets.FRED_API_KEY }}
          BOK_ECOS_API_KEY:       ${{ secrets.BOK_ECOS_API_KEY }}

          # ── 뉴스 / 감성 ────────────────────────────────────────
          NAVER_CLIENT_ID:        ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:    ${{ secrets.NAVER_CLIENT_SECRET }}

          # ── KRX 시장 데이터 ────────────────────────────────────
          KRX_OpenAPI:            ${{ secrets.KRX_OPENAPI }}
          KRX_ID:                 ${{ secrets.KRX_ID }}
          KRX_PW:                 ${{ secrets.KRX_PW }}

          # ── 공시 (DART) ────────────────────────────────────────
          DART_API_KEY:           ${{ secrets.DART_API_KEY }}

          # ── Notion 발행 ────────────────────────────────────────
          NOTION_API_KEY:         ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:     ${{ secrets.NOTION_DATABASE_ID }}

          # ── 런타임 설정 ────────────────────────────────────────
          PYTHONIOENCODING:       utf-8
          PYTHONUNBUFFERED:       "1"
        run: python -m src.graph.pipeline

      # ── 7. 생성된 리포트 업로드 (아티팩트) ───────────────────────
      # Notion 발행 실패 시 로컬 fallback 파일을 Actions 아티팩트로 보존
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: |
            data/reports/
            logs/
          retention-days: 7
          if-no-files-found: ignore
